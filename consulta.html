<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Agendar Consulta • Fisioterapia em Foco</title>

  <link rel="stylesheet" href="css/estilo.css" />
</head>
<body>

  <header class="topo">
    <div class="container">
      <h1>Fisioterapia em Foco</h1>
      <p class="subtitulo">Saúde, Movimento e Qualidade de Vida</p>

      <nav class="menu">
        <a href="index.html">Início</a>
        <a href="quemsomos.html">Sobre nós</a>
        <a href="servicos.html">Serviços</a>
        <a href="contato.html">Contato</a>
      </nav>
    </div>
  </header>

  <main class="container agenda-pagina">
    <h2>Agende sua Consulta</h2>

    <form class="agenda-formulario">
      <label for="nome">Nome completo *</label>
      <input type="text" id="nome" name="nome" required pattern="[A-Za-zÀ-ú\s]+" placeholder="Seu nome completo" />

      <label for="email">E-mail *</label>
      <input type="email" id="email" name="email" required placeholder="exemplo@dominio.com" />

      <label for="telefone">Telefone *</label>
      <input type="tel" id="telefone" name="telefone" required pattern="\d{10,11}" placeholder="(99) 99999-9999" />

      <label for="data">Data da Consulta *</label>
      <input type="date" id="data" name="data" required />

      <label for="especialidade">Especialidade *</label>
      <select id="especialidade" name="especialidade" required>
        <option value="" disabled selected>Escolha uma especialidade</option>
        <option value="ortopedica">Fisioterapia Ortopédica</option>
        <option value="neurologica">Fisioterapia Neurológica</option>
        <option value="respiratoria">Fisioterapia Respiratória</option>
        <option value="geriatrica">Fisioterapia Geriátrica</option>
        <option value="esportiva">Fisioterapia Esportiva</option>
      </select>

      <label for="mensagem">Mensagem / Observações</label>
      <textarea id="mensagem" name="mensagem" rows="4" placeholder="Alguma informação adicional?"></textarea>

      <button type="submit">Enviar</button>
    </form>
  </main>

  <footer class="rodape">
    <div class="container">
      &copy; 2025 Lucas Franca e Kaio Melo — Projeto acadêmico
    </div>
  </footer>

</body>
</html>
